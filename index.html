<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digaf MFI - Smart Finance Importer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 flex h-screen antialiased">

    <div class="w-64 h-screen bg-slate-50 border-r border-slate-200 p-4 flex flex-col justify-between">
        <div>
            <div class="flex items-center space-x-2 mb-8 px-2">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-bold">D</div>
                <span class="text-xl font-bold text-slate-800">Digaf <span class="text-xs text-purple-600">MFI</span></span>
            </div>
            <nav class="space-y-6">
                <div>
                    <p class="text-xs font-semibold text-slate-400 tracking-wider mb-2 px-2">OVERVIEW</p>
                    <div class="space-y-1">
                        <button onclick="setStatusFilter('')" class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm font-medium bg-purple-50 text-purple-700 border-l-4 border-purple-600">
                            <span>Total Clients</span>
                            <span id="sidebar-count" class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                    </div>
                </div>
            </nav>
        </div>
        <div class="text-xs text-slate-400 px-2">Powered by Kidus • Control Panel</div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
            <h1 class="text-sm font-bold text-slate-700 bg-purple-50 px-3 py-1 rounded border">SMART FINANCE IMPORTER</h1>
            <div id="sync-status" class="text-xs text-emerald-600 font-medium">Cloud Live Sync Active</div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 space-y-6">
            <div class="grid grid-cols-4 gap-4">
                <div onclick="setStatusFilter('Paid')" id="card-Paid" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm cursor-pointer hover:border-emerald-400">
                    <span class="text-xs font-bold text-slate-400 uppercase">🟢 Paid</span>
                    <div id="count-paid" class="text-2xl font-extrabold text-emerald-600 mt-2">0</div>
                </div>
                <div onclick="setStatusFilter('Renewal')" id="card-Renewal" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm cursor-pointer hover:border-amber-400">
                    <span class="text-xs font-bold text-slate-400 uppercase">🟡 Renewal</span>
                    <div id="count-renewal" class="text-2xl font-extrabold text-amber-500 mt-2">0</div>
                </div>
                <div onclick="setStatusFilter('No Response')" id="card-NoResponse" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm cursor-pointer hover:border-red-400">
                    <span class="text-xs font-bold text-slate-400 uppercase">🔴 No Response</span>
                    <div id="count-noresponse" class="text-2xl font-extrabold text-red-500 mt-2">0</div>
                </div>
                <div onclick="setStatusFilter('Complete')" id="card-Complete" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm cursor-pointer hover:border-indigo-400">
                    <span class="text-xs font-bold text-slate-400 uppercase">🔵 Complete</span>
                    <div id="count-complete" class="text-2xl font-extrabold text-indigo-600 mt-2">0</div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                <div class="flex gap-4 mb-6">
                    <input type="text" id="client-name" placeholder="Client Name..." class="border p-2 rounded-lg flex-1">
                    <select id="custom-status" class="border p-2 rounded-lg">
                        <option value="Renewal">Renewal</option>
                        <option value="Paid">Paid</option>
                        <option value="No Response">No Response</option>
                        <option value="Complete">Complete</option>
                    </select>
                    <button onclick="registerClient()" class="bg-purple-600 text-white px-6 rounded-lg font-bold">Save</button>
                </div>

                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-xs text-slate-500 uppercase">
                        <tr><th class="p-4">Name</th><th class="p-4">Status</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="ledger-rows" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://logercqzvkwfibaumcvf.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_aWSqUZw9NaQDS6yDcwJhJw_79ZERzZ4";
        let globalRecords = [];
        let activeStatusFilter = "";

        async function fetchRecordsFromCloud() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?select=*`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            globalRecords = await res.json();
            renderLedger();
        }

        async function registerClient() {
            const name = document.getElementById('client-name').value.trim();
            if (globalRecords.some(r => r.name.toLowerCase() === name.toLowerCase())) return alert("Duplicate name!");
            
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: 'c_' + Date.now(), name, status: document.getElementById('custom-status').value, timestamp: new Date().toLocaleString() })
            });
            fetchRecordsFromCloud();
        }

        async function deleteRecord(id) {
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            fetchRecordsFromCloud();
        }

        function setStatusFilter(status) { activeStatusFilter = status; renderLedger(); }

        function renderLedger() {
            const filtered = activeStatusFilter ? globalRecords.filter(r => r.status === activeStatusFilter) : globalRecords;
            document.getElementById('count-paid').innerText = globalRecords.filter(r => r.status === 'Paid').length;
            document.getElementById('count-renewal').innerText = globalRecords.filter(r => r.status === 'Renewal').length;
            document.getElementById('count-noresponse').innerText = globalRecords.filter(r => r.status === 'No Response').length;
            document.getElementById('count-complete').innerText = globalRecords.filter(r => r.status === 'Complete').length;
            document.getElementById('sidebar-count').innerText = globalRecords.length;

            document.getElementById('ledger-rows').innerHTML = filtered.map(r => `
                <tr>
                    <td class="p-4 font-bold">${r.name}</td>
                    <td class="p-4">${r.status}</td>
                    <td class="p-4"><button onclick="deleteRecord('${r.id}')" class="text-red-500 font-bold">Delete</button></td>
                </tr>
            `).join('');
        }

        fetchRecordsFromCloud();
    </script>
</body>
</html>
