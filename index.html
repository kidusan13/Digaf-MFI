<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digaf MFI - Advanced Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 flex h-screen antialiased">

    <div class="w-64 h-screen bg-slate-50 border-r border-slate-200 p-4 flex flex-col justify-between">
        <div>
            <div class="flex items-center space-x-2 mb-8 px-2">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-bold">D</div>
                <span class="text-xl font-bold text-slate-800">Digaf <span class="text-xs text-purple-600">MFI</span></span>
            </div>
            <nav class="space-y-6">
                <div>
                    <p class="text-xs font-semibold text-slate-400 tracking-wider mb-2 px-2">OVERVIEW</p>
                    <div class="space-y-1">
                        <button onclick="setStatusFilter('')" class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm font-medium bg-purple-50 text-purple-700 border-l-4 border-purple-600">
                            <span>All Clients</span>
                            <span id="sidebar-count" class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                    </div>
                </div>
            </nav>
        </div>
        <button onclick="exportToCSV()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-3 rounded-lg shadow uppercase transition-all">📥 Export CSV Report</button>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
            <h1 class="text-sm font-bold tracking-wider text-slate-700 bg-purple-50 px-3 py-1 rounded border border-purple-100">SMART FINANCE IMPORTER</h1>
            <select id="active-officer" onchange="saveOfficer()" class="bg-slate-100 px-3 py-1.5 rounded-lg text-xs font-semibold text-purple-700 border border-slate-200 cursor-pointer">
                <option value="Kidus">Kidus</option>
                <option value="Samuel">Samuel</option>
                <option value="Suraphel">Suraphel</option>
                <option value="Natnael">Natnael</option>
                <option value="Ezana">Ezana</option>
                <option value="Zewdneh">Zewdneh</option>
            </select>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div onclick="setStatusFilter('Paid')" class="bg-white p-4 rounded-xl border border-slate-200 hover:border-emerald-400 cursor-pointer transition-all shadow-sm">
                    <span class="text-xs font-bold text-slate-400 uppercase">🟢 Paid</span>
                    <p id="count-paid" class="text-2xl font-extrabold text-emerald-600">0</p>
                </div>
                <div onclick="setStatusFilter('Renewal')" class="bg-white p-4 rounded-xl border border-slate-200 hover:border-amber-400 cursor-pointer transition-all shadow-sm">
                    <span class="text-xs font-bold text-slate-400 uppercase">🟡 Renewal</span>
                    <p id="count-renewal" class="text-2xl font-extrabold text-amber-500">0</p>
                </div>
                <div onclick="setStatusFilter('No Response')" class="bg-white p-4 rounded-xl border border-slate-200 hover:border-red-400 cursor-pointer transition-all shadow-sm">
                    <span class="text-xs font-bold text-slate-400 uppercase">🔴 No Response</span>
                    <p id="count-noresponse" class="text-2xl font-extrabold text-red-500">0</p>
                </div>
                <div onclick="setStatusFilter('Complete')" class="bg-white p-4 rounded-xl border border-slate-200 hover:border-indigo-400 cursor-pointer transition-all shadow-sm">
                    <span class="text-xs font-bold text-slate-400 uppercase">🔵 Complete</span>
                    <p id="count-complete" class="text-2xl font-extrabold text-indigo-600">0</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex gap-4">
                <input type="text" id="client-name" placeholder="የደንበኛ ሙሉ ስም..." class="flex-1 px-4 py-2 border border-slate-200 rounded-lg outline-none focus:border-purple-500">
                <select id="custom-status" class="px-4 py-2 border border-slate-200 rounded-lg outline-none">
                    <option value="Renewal">🟡 Renewal</option>
                    <option value="Paid">🟢 Paid</option>
                    <option value="No Response">🔴 No Response</option>
                    <option value="Complete">🔵 Complete</option>
                </select>
                <button onclick="registerClient()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold text-sm">መዝግብ</button>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase">
                        <tr>
                            <th class="px-6 py-3">Client Name</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-rows" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://logercqzvkwfibaumcvf.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_aWSqUZw9NaQDS6yDcwJhJw_79ZERzZ4";
        let globalRecords = [];
        let activeStatusFilter = "";

        function saveOfficer() { localStorage.setItem('activeOfficer', document.getElementById('active-officer').value); }

        window.onload = () => {
            const saved = localStorage.getItem('activeOfficer');
            if(saved) document.getElementById('active-officer').value = saved;
            fetchRecordsFromCloud();
        };

        async function fetchRecordsFromCloud() {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?select=*`, {
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`}
            });
            globalRecords = await response.json();
            renderLedger();
        }

        function setStatusFilter(status) {
            activeStatusFilter = status;
            renderLedger();
        }

        async function registerClient() {
            const name = document.getElementById('client-name').value;
            if(!name) return alert("ስም ያስገቡ!");
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records`, {
                method: 'POST',
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    id: 'id_' + Date.now(), 
                    name: name, 
                    status: document.getElementById('custom-status').value, 
                    created_by: document.getElementById('active-officer').value, 
                    timestamp: new Date().toLocaleString() 
                })
            });
            document.getElementById('client-name').value = '';
            fetchRecordsFromCloud();
        }

        async function deleteRecord(id) {
            if(!confirm("እርግጠኛ ነዎት መሰረዝ ይፈልጋሉ?")) return;
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?id=eq.${id}`, {
                method: 'DELETE',
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`}
            });
            fetchRecordsFromCloud();
        }

        async function editName(id, currentName) {
            const newName = prompt("አዲሱን ስም ያስገቡ:", currentName);
            if(!newName) return;
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?id=eq.${id}`, {
                method: 'PATCH',
                headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json'},
                body: JSON.stringify({ name: newName })
            });
            fetchRecordsFromCloud();
        }

        function exportToCSV() {
            let csv = "Name,Status,Officer,Time\n";
            globalRecords.forEach(r => csv += `${r.name},${r.status},${r.created_by},${r.timestamp}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Digaf_Report.csv');
            a.click();
        }

        function renderLedger() {
            const tbody = document.getElementById('ledger-rows');
            tbody.innerHTML = '';
            const data = activeStatusFilter ? globalRecords.filter(r => r.status === activeStatusFilter) : globalRecords;
            
            document.getElementById('sidebar-count').innerText = globalRecords.length;
            document.getElementById('count-paid').innerText = globalRecords.filter(r => r.status === 'Paid').length;
            document.getElementById('count-renewal').innerText = globalRecords.filter(r => r.status === 'Renewal').length;
            document.getElementById('count-noresponse').innerText = globalRecords.filter(r => r.status === 'No Response').length;
            document.getElementById('count-complete').innerText = globalRecords.filter(r => r.status === 'Complete').length;

            data.forEach(r => {
                tbody.innerHTML += `
                    <tr class="text-sm">
                        <td class="px-6 py-4 font-bold">${r.name}</td>
                        <td class="px-6 py-4">${r.status}</td>
                        <td class="px-6 py-4 space-x-2">
                            <button onclick="editName('${r.id}', '${r.name}')" class="text-blue-600 hover:underline text-xs">Edit</button>
                            <button onclick="deleteRecord('${r.id}')" class="text-red-600 hover:underline text-xs">Delete</button>
                        </td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
