<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digaf MFI - Smart Finance Importer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 flex h-screen antialiased">

    <div class="w-64 h-screen bg-slate-50 border-r border-slate-200 p-4 flex flex-col justify-between">
        <div>
            <div class="flex items-center space-x-2 mb-8 px-2">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-bold">D</div>
                <span class="text-xl font-bold text-slate-800">Digaf <span class="text-xs text-purple-600">MFI</span></span>
            </div>
            <nav class="space-y-6">
                <div>
                    <p class="text-xs font-semibold text-slate-400 tracking-wider mb-2 px-2">OVERVIEW</p>
                    <div class="space-y-1">
                        <button onclick="setStatusFilter('')" class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm font-medium bg-purple-50 text-purple-700 border-l-4 border-purple-600">
                            <span>Total Registered Clients</span>
                            <span id="sidebar-count" class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                    </div>
                </div>
            </nav>
        </div>
        <div class="text-xs text-slate-400 px-2">Powered by Kidus • Control Panel</div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <h1 class="text-sm font-bold tracking-wider text-slate-700 bg-purple-50 px-3 py-1 rounded border border-purple-100">SMART FINANCE IMPORTER</h1>
                <div class="flex items-center space-x-1 text-xs text-emerald-600 font-medium">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span id="sync-status">Cloud Live Sync Active</span>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <label class="text-xs font-bold text-slate-400 uppercase">Active Officer:</label>
                <select id="active-officer" class="bg-slate-100 px-3 py-1.5 rounded-lg text-xs font-semibold text-purple-700 border border-slate-200 focus:outline-none focus:border-purple-500 cursor-pointer">
                    <option value="Kidus">Kidus</option>
                    <option value="Officer 2">Officer 2</option>
                    <option value="Officer 3">Officer 3</option>
                    <option value="Officer 4">Officer 4</option>
                </select>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 space-y-6">
            
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                <div>
                    <h2 class="text-sm font-bold text-purple-900 flex items-center space-x-2">
                        <span class="w-2 h-2 bg-purple-600 rounded-full"></span>
                        <span>Client Workflow & Check Console</span>
                    </h2>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 space-y-4">
                    <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wider text-purple-700">➕ 1. Register New Client</h3>
                    <input type="text" id="client-name" placeholder="የደንበኛውን ሙሉ ስም ያስገቡ..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-2">
                    <select id="custom-status" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm mb-2">
                        <option value="Renewal">🟡 Renewal</option>
                        <option value="Paid">🟢 Paid</option>
                        <option value="No Response">🔴 No Response</option>
                        <option value="Complete">🔵 Complete</option>
                    </select>
                    <button onclick="registerClient()" class="w-full bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold py-2.5 rounded-lg">SAVE TO CLOUD</button>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-100 text-slate-500 text-[11px] font-bold uppercase">
                            <th class="px-6 py-3">Client Name</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Logs & Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-rows" class="divide-y divide-slate-200 text-xs"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://logercqzvkwfibaumcvf.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_aWSqUZw9NaQDS6yDcwJhJw_79ZERzZ4";

        let globalRecords = [];

        document.addEventListener('DOMContentLoaded', fetchRecordsFromCloud);

        async function fetchRecordsFromCloud() {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?select=*`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            globalRecords = await response.json();
            renderLedger();
        }

        async function registerClient() {
            const name = document.getElementById('client-name').value;
            const status = document.getElementById('custom-status').value;
            if (!name) return alert("ስም አስገባ!");
            
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: 'c_' + Date.now(), 
                    name: name, 
                    status: status, 
                    created_by: document.getElementById('active-officer').value,
                    timestamp: new Date().toLocaleString()
                })
            });
            fetchRecordsFromCloud();
        }

        async function deleteRecord(id) {
            if (!confirm("ይህንን መረጃ መሰረዝ ትፈልጋለህ?")) return;
            await fetch(`${SUPABASE_URL}/rest/v1/digaf_records?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            fetchRecordsFromCloud();
        }

        function renderLedger() {
            const tbody = document.getElementById('ledger-rows');
            tbody.innerHTML = '';
            globalRecords.forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td class="px-6 py-3 font-bold">${r.name}</td>
                        <td class="px-6 py-3">${r.status}</td>
                        <td class="px-6 py-3">
                            <div class="text-[10px] text-slate-400">${r.timestamp}</div>
                            <button onclick="deleteRecord('${r.id}')" class="text-red-500 font-bold underline">🗑 Delete</button>
                        </td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
