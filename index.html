<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digaf MFI - Client Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 flex h-screen antialiased">

    <!-- SIDEBAR -->
    <div class="w-64 h-screen bg-slate-50 border-r border-slate-200 p-4 flex flex-col justify-between">
        <div>
            <div class="flex items-center space-x-2 mb-8 px-2">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-bold">D</div>
                <span class="text-xl font-bold text-slate-800">Digaf <span class="text-xs text-purple-600">MFI</span></span>
            </div>
            <nav class="space-y-6">
                <div>
                    <p class="text-xs font-semibold text-slate-400 tracking-wider mb-2 px-2">OVERVIEW</p>
                    <div class="space-y-1">
                        <button class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm font-medium bg-purple-50 text-purple-700 border-l-4 border-purple-600">
                            <span>Total Registered Clients</span>
                            <span id="sidebar-count" class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                        </button>
                    </div>
                </div>
            </nav>
        </div>
        <div class="text-xs text-slate-400 px-2">Powered by Kidus • Control Panel</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- HEADER -->
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <h1 class="text-sm font-bold tracking-wider text-slate-700 bg-purple-50 px-3 py-1 rounded border border-purple-100">CLIENT STATUS TRACKER</h1>
                <div class="flex items-center space-x-1 text-xs text-emerald-600 font-medium">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span>System Active</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="bg-slate-100 px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-700 border border-slate-200">
                    Active Officer: <span class="text-purple-700">Kidusyared Liku</span>
                </div>
            </div>
        </header>

        <!-- MAIN SECTION -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 space-y-6">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                <div>
                    <h2 class="text-sm font-bold text-purple-900 flex items-center space-x-2">
                        <span class="w-2 h-2 bg-purple-600 rounded-full"></span>
                        <span>Client Management Console</span>
                    </h2>
                    <p class="text-xs text-slate-400 mt-1">የደንበኛ ስም ብቻ ያስገቡ፤ ያለበትን ሁኔታ (Status) ይምረጡ ወይም ይቀይሩ።</p>
                </div>
                <button onclick="clearData()" class="text-xs bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg font-medium border border-red-200 transition-all">
                    Reset Ledger
                </button>
            </div>

            <!-- REGISTRATION FORM (NAME & STATUS ONLY) -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider">👤 Register New Client</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Name Input Only -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Client Full Name (የደንበኛ ሙሉ ስም)</label>
                        <input type="text" id="client-name" placeholder="የደንበኛውን ስም እዚህ ይጻፉ..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-purple-500 font-medium">
                    </div>
                    
                    <!-- Status Dropdown -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Initial Status (የሂደት ሁኔታ)</label>
                        <select id="custom-status" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-purple-500 font-medium text-slate-700">
                            <option value="Paid">🟢 Paid</option>
                            <option value="Renewal">🟡 Renewal</option>
                            <option value="No Response">🔴 No Response</option>
                            <option value="Complete">🔵 Complete</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex justify-end pt-2">
                    <button onclick="registerClient()" class="bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold px-8 py-2.5 rounded-lg shadow transition-all uppercase tracking-wider">
                        Save Client
                    </button>
                </div>
            </div>

            <!-- REGISTERED CLIENTS TABLE -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wider">📋 Client Ledger</h3>
                    <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-4 py-1.5 rounded-lg shadow transition-all flex items-center space-x-1">
                        <span>📥</span> <span>Export to Excel</span>
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100/70 border-b border-slate-200 text-slate-500 text-[11px] font-bold uppercase tracking-wider">
                                <th class="px-6 py-3 w-1/3">Client Full Name</th>
                                <th class="px-6 py-3 w-1/3">Current Status</th>
                                <th class="px-6 py-3 w-1/3">Registration Time</th>
                            </tr>
                        </thead>
                        <tbody id="ledger-rows" class="divide-y divide-slate-200 text-xs text-slate-700">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderLedger();
        });

        // --- CLIENT REGISTRATION LOGIC ---
        function registerClient() {
            const nameInput = document.getElementById('client-name');
            const statusSelect = document.getElementById('custom-status');
            
            if (!nameInput.value.trim()) {
                alert("እባክህ የደንበኛውን ስም አስገባ!");
                return;
            }

            const records = JSON.parse(localStorage.getItem('digaf_records') || '[]');
            const newRecord = {
                id: 'client_' + Date.now() + Math.random().toString(36).substr(2, 4),
                timestamp: new Date().toLocaleTimeString() + ' ' + new Date().toLocaleDateString(),
                name: nameInput.value.trim(),
                status: statusSelect.value
            };
            
            records.unshift(newRecord);
            localStorage.setItem('digaf_records', JSON.stringify(records));
            
            nameInput.value = ''; // Clear input field
            renderLedger();
        }

        // --- UPDATE STATUS LIVE ON TABLE ---
        function updateStatus(clientId, newStatus) {
            const records = JSON.parse(localStorage.getItem('digaf_records') || '[]');
            const clientIndex = records.findIndex(r => r.id === clientId);
            
            if (clientIndex !== -1) {
                records[clientIndex].status = newStatus;
                localStorage.setItem('digaf_records', JSON.stringify(records));
                renderLedger();
            }
        }

        // --- RENDER TABLE ---
        function renderLedger() {
            const records = JSON.parse(localStorage.getItem('digaf_records') || '[]');
            const tbody = document.getElementById('ledger-rows');
            const sidebarCount = document.getElementById('sidebar-count');
            
            sidebarCount.innerText = records.length;
            tbody.innerHTML = '';

            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-slate-400 italic">ምንም የተመዘገበ ደንበኛ የለም።</td></tr>`;
                return;
            }

            records.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-all";
                
                let selectColorClass = "border-blue-200 text-blue-700 bg-blue-50";
                if (r.status === "Paid") selectColorClass = "border-emerald-200 text-emerald-700 bg-emerald-50";
                if (r.status === "Renewal") selectColorClass = "border-amber-200 text-amber-700 bg-amber-50";
                if (r.status === "No Response") selectColorClass = "border-red-200 text-red-700 bg-red-50";
                if (r.status === "Complete") selectColorClass = "border-indigo-200 text-indigo-700 bg-indigo-50";

                tr.innerHTML = `
                    <td class="px-6 py-3 font-semibold text-slate-800 text-sm">${r.name}</td>
                    <td class="px-6 py-3">
                        <select onchange="updateStatus('${r.id}', this.value)" class="${selectColorClass} border rounded-lg text-xs font-bold px-3 py-1.5 focus:outline-none cursor-pointer w-48">
                            <option value="Paid" ${r.status === 'Paid' ? 'selected' : ''}>🟢 Paid</option>
                            <option value="Renewal" ${r.status === 'Renewal' ? 'selected' : ''}>🟡 Renewal</option>
                            <option value="No Response" ${r.status === 'No Response' ? 'selected' : ''}>🔴 No Response</option>
                            <option value="Complete" ${r.status === 'Complete' ? 'selected' : ''}>🔵 Complete</option>
                        </select>
                    </td>
                    <td class="px-6 py-3 font-mono text-[11px] text-slate-400">${r.timestamp}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function clearData() {
            if(confirm("እርግጠኛ ነህ ሁሉንም ደንበኞች ማጥፋት ትፈልጋለህ?")) {
                localStorage.removeItem('digaf_records');
                renderLedger();
            }
        }

        function exportToExcel() {
            const records = JSON.parse(localStorage.getItem('digaf_records') || '[]');
            if (records.length === 0) {
                alert("የሚወርድ መረጃ የለም!");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Client Name,Status,Registration Time\n";

            records.forEach(r => {
                const row = `"${r.name.replace(/"/g, '""')}",${r.status},${r.timestamp}`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Kidus_Client_Ledger_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
